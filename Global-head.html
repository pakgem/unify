<script>
  (function forceLazyNavLotties() {
    function makeLazy(root) {
      (root || document)
        .querySelectorAll(".nav-lottie[data-animation-type='lottie']")
        .forEach(function (el) {
          el.setAttribute("data-loading", "lazy");
          el.setAttribute("data-autoplay", "0");
          el.setAttribute("data-loop", "0");
        });
    }

    makeLazy();

    new MutationObserver(function (mutations) {
      mutations.forEach(function (mutation) {
        mutation.addedNodes.forEach(function (node) {
          if (node.nodeType === 1) makeLazy(node);
        });
      });
    }).observe(document.documentElement, { childList: true, subtree: true });
  })();
</script>

<style>
