<!-- ================= Logo footer drag ================= -->
<script>
  (function () {
    var SRC =
      "https://cdn.prod.website-files.com/69ab6e0360675acdbd1f014f/6a2a498f99570e6f8d6a4359_bb9e7b76488ed1e77331ffa4a379cab0_unify-footer-logo-drag.min.txt";
    var loaded = false;

    function load() {
      if (loaded) return;
      loaded = true;

      var s = document.createElement("script");
      s.src = SRC;
      s.async = true;
      document.head.appendChild(s);
    }

    window.addEventListener(
      "load",
      function () {
        var logo = document.querySelector(".footer_logo");
        if (!logo) return;

        logo.addEventListener("pointerenter", load, {
          once: true,
          passive: true,
        });
        logo.addEventListener("touchstart", load, {
          once: true,
          passive: true,
        });

        if ("IntersectionObserver" in window) {
          var io = new IntersectionObserver(
            function (entries) {
              if (
                !entries.some(function (e) {
                  return e.isIntersecting;
                })
              )
                return;
              io.disconnect();
              load();
            },
            { rootMargin: "900px 0px" },
          );

          io.observe(logo);
        } else {
          load();
        }
      },
      { once: true },
    );
  })();
</script>

<script>
  (function () {
    function getText(el) {
      return (
        el.getAttribute("data-cta-name") ||
        el.getAttribute("aria-label") ||
        el.innerText ||
        el.textContent ||
        ""
      )
        .trim()
        .slice(0, 120);
    }

    function trackButtonClick(el) {
      var props = {
        cta_name: getText(el),
        cta_location: el.getAttribute("data-cta-location") || "",
        cta_href: el.href || el.getAttribute("href") || "",
        page_path: window.location.pathname,
        page_url: window.location.href,
        page_title: document.title,
      };

      if (window.posthog && typeof window.posthog.capture === "function") {
        window.posthog.capture("Marketing CTA Clicked", props);
      }

      if (window.unify && typeof window.unify.track === "function") {
        window.unify.track("Marketing CTA Clicked", props);
      }
    }

    document.addEventListener(
      "click",
      function (event) {
        var el = event.target.closest("[data-track-cta='true']");
        if (!el) return;
        trackButtonClick(el);
      },
      true,
    );
  })();
</script>
